application_info:
    title: "DSP Mixer"
    about_category_title: "About"
    about_paragraph_1: >
        This application is an open-source application designed to demonstrate the functionalities of FluexGL DSP.
        The goal of FluexGL DSP is to create and manipulate sound from various contexts.
    about_paragraph_2: >
        This project is part of the Fluex ecosystem and is currently maintained by
        Rohan Kanhaisingh, the lead developer of this entire project.
    disclaimer_category_title: "Disclaimer"
    disclaimer_text: >
        This application is continued and will be maintained over time.
    how_to_use_category_title: "How to use"
    how_to_use_text: >
        Upload an audio file, create a DSP audio clip, attach it to a channel, and play it.
        You can attach effects to each channel, but the 'ChannelPostAnalyser' effect cannot be modified
        because it is an essential part of this mixer.
