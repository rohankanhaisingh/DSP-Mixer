application_info:
    title: "DSP Mixer"
    about_category_title: "Over"
    about_paragraph_1: >
        Deze applicatie is een open-source applicatie om de functionaliteiten van FluexGL DSP te demonstreren.
        Het doel van FluexGL DSP is het creëren en manipuleren van geluid vanuit verschillende contexten.
    about_paragraph_2: >
        Dit project is onderdeel van het Fluex-ecosysteem en wordt momenteel onderhouden door
        Rohan Kanhaisingh, de hoofdontwikkelaar van dit volledige project.
    disclaimer_category_title: "Disclaimer"
    disclaimer_text: >
        Deze applicatie, DSP Mixer, wordt niet langer onderhouden, omdat de live versie wordt gebruikt.
        Je kunt de live versie bezoeken via {}
    how_to_use_category_title: "Hoe te gebruiken"
    how_to_use_text: >
        Upload een audio bestand, maak een DSP audio clip aan, koppel deze aan een kanaal en speel hem af.
        Je kunt effecten koppelen aan elk kanaal, maar het effect 'ChannelPostAnalyser' kan niet aangepast
        worden omdat dit een essentieel onderdeel is van deze mixer.
